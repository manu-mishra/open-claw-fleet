version: '3.8'

services:
  conduit:
    image: matrixconduit/matrix-conduit:latest
    ports:
      - "6167:6167"
    environment:
      CONDUIT_CONFIG: /etc/conduit.toml
    volumes:
      - conduit_data:/var/lib/matrix-conduit
      - ./conduit.toml:/etc/conduit.toml:ro
    networks:
      - fleet

  element:
    image: vectorim/element-web
    ports:
      - "8080:80"
    volumes:
      - ./element-config.json:/app/config.json:ro
    depends_on:
      - conduit
    networks:
      - fleet

  command-center:
    build:
      context: ../../..
      dockerfile: docker-files/aws/Dockerfile.command-center
    environment:
      PORT: 8090
      DATA_DIR: /data/command-center
      WORKSPACES_ROOT: /data/workspaces
      MATRIX_HOMESERVER: http://conduit:6167
      MATRIX_DOMAIN: anycompany.corp
      COMMAND_CENTER_PUBLIC_URL: ${COMMAND_CENTER_PUBLIC_URL:-http://localhost:8090}
      COMMAND_CENTER_API_BASE_URL: http://127.0.0.1:8090
      NEXT_PUBLIC_COMMAND_CENTER_API_BASE_URL: ${COMMAND_CENTER_PUBLIC_URL:-http://localhost:8090}
      TASK_ASSIGNMENT_BOT_MATRIX_ID: ${TASK_ASSIGNMENT_BOT_MATRIX_ID:-@task.assignments:anycompany.corp}
      ORG_FILE_PATH: /data/workspaces/org.json
      ORG_DEPLOYED_FILE_PATH: /data/workspaces/deployed-org.json
      COMMAND_CENTER_API_TOKEN: ${FLEET_SECRET}
      MATRIX_PASSWORD_SEED: ${FLEET_SECRET}
    ports:
      - "8090:8090"
    volumes:
      - ${HOST_ROOT}/config/environments/local/workspaces:/data/workspaces:ro
      - command_center_data:/data/command-center
    depends_on:
      - conduit
    networks:
      - fleet

  fleet-manager:
    build:
      context: ../../..
      dockerfile: config/environments/local/Dockerfile.fleet-manager
    environment:
      FLEET_SECRET: ${FLEET_SECRET}
      COMMAND_CENTER_URL: http://command-center:8090
      COMMAND_CENTER_API_TOKEN: ${FLEET_SECRET}
      HOST_ROOT: ${HOST_ROOT}
      HOST_HOME: ${HOST_HOME:-${HOME}}
      AWS_REGION: us-east-1
      AWS_PROFILE: ${AWS_PROFILE}
      AWS_SDK_LOAD_CONFIG: ${AWS_SDK_LOAD_CONFIG:-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOST_ROOT}:/app
      - ${HOME}/.aws:/root/.aws:ro
    working_dir: /app
    depends_on:
      - conduit
    networks:
      - fleet

networks:
  fleet:
    driver: bridge

volumes:
  conduit_data:
  command_center_data:
